<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>점포라인 업무용 어플리케이션 (임직원용)</title>
    <meta name="description" content="점포라인 매물광고 이용계약서 전자서명" />
    <!-- 머티리얼 토널 리스킨 서체 (2026-07-13 대표님 확정 디자인) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <script>
      // 테마를 렌더 전에 적용 — 다크 모드에서 흰 화면 번쩍임 방지
      document.documentElement.dataset.theme = localStorage.getItem('theme') === 'dark' ? 'dark' : 'light'
    </script>
    <!-- PWA: 홈 화면 추가 시 전체화면 실행 -->
    <link rel="manifest" href="/app/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="점포라인 업무용 어플리케이션 (임직원용)" />
    <link rel="apple-touch-icon" href="/app/icon-180.png" />
    <link rel="icon" type="image/svg+xml" href="/app/icon.svg" />
    <meta name="theme-color" content="#1d4ed8" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
